  </defs>

  <rect width="1024" height="1024" rx="96" fill="url(#void-bg)"/>
  <rect x="30" y="30" width="964" height="964" rx="74" fill="none" stroke="#6d28d9" stroke-width="18"/>
  <rect x="54" y="54" width="916" height="916" rx="54" fill="none" stroke="#1e1e2e" stroke-width="3"/>
  <circle cx="512" cy="392" r="390" fill="url(#accent-glow)"/>

  <g opacity="0.22" stroke="#8b5cf6" stroke-width="2">
    <path d="M128 250H896"/>
    <path d="M128 374H896"/>
    <path d="M128 498H896"/>
    <path d="M128 622H896"/>
    <path d="M128 746H896"/>
    <path d="M250 128V856"/>
    <path d="M374 128V856"/>
    <path d="M498 128V856"/>
    <path d="M622 128V856"/>
    <path d="M746 128V856"/>
