  <path d="M250 766 C310 708 372 708 512 766 C652 824 714 824 774 766" fill="none" stroke="#e4e4e7" stroke-width="18" stroke-linecap="round"/>
  <path d="M250 816 C310 758 372 758 512 816 C652 874 714 874 774 816" fill="none" stroke="#8b5cf6" stroke-width="12" stroke-linecap="round"/>
  <text x="512" y="930" text-anchor="middle" fill="#e4e4e7" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="72" font-weight="700" letter-spacing="0">MORPHIX</text>
