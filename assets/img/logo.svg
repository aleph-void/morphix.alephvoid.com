<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Morphix plugin icon</title>
  <desc id="desc">Aleph Void inspired Morphix synthesizer icon for AUv3 and VST3 builds.</desc>
  <defs>
    <linearGradient id="void-bg" x1="128" y1="80" x2="896" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16161f"/>
      <stop offset="0.62" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="accent-glow" cx="50%" cy="38%" r="65%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.48"/>
      <stop offset="0.45" stop-color="#6d28d9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-24%" y="-24%" width="148%" height="148%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
